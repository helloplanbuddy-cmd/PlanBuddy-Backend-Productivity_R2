global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/alert.rules.yml

scrape_configs:
  - job_name: 'planbuddy-api'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['api:3000']  # Links to docker-compose.yml 'api' service
    relabel_configs:
      - source_labels: [__address__]
        target_label: job
        replacement: planbuddy-api

  - job_name: 'planbuddy-postgres'
    metrics_path: '/metrics'
    scrape_interval: 30s
    static_configs:
      - targets: ['postgres-exporter:9187']  # Add postgres_exporter later if needed

  - job_name: 'node-redis'
    metrics_path: '/metrics'
    scrape_interval: 30s
    static_configs:
      - targets: ['redis:9121']  # Add redis_exporter later

